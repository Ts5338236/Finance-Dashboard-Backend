openapi: 3.0.3
info:
  title: Finance Dashboard API
  version: 1.0.0
  description: API for managing personal financial records and dashboard analytics.
paths:
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/dashboard/summary/:
    get:
      operationId: dashboard_summary_retrieve
      description: |-
        Dashboard summary API for total income, expenses, balance,
        category-wise totals, recent transactions, and monthly trends.
        Only accessible by Analyst and Admin.
      tags:
      - dashboard
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/records/records/:
    get:
      operationId: records_records_list
      description: |-
        API endpoint that allows financial records to be managed.
        Viewer: Read-only access to all records.
        Analyst: Read-only access to all records. (Wait, requirement says Analyst can view records and dashboard).
        Admin: Full CRUD.

        Actually, let's refine based on requirements:
        Viewer: Can only view data.
        Analyst: Can view records and dashboard.
        Admin: Full access (CRUD + user management).
      parameters:
      - in: query
        name: category
        schema:
          type: string
          enum:
          - entertainment
          - food
          - health
          - other
          - rent
          - salary
          - transport
          - utilities
        description: |-
          * `salary` - Salary
          * `food` - Food
          * `rent` - Rent
          * `utilities` - Utilities
          * `transport` - Transport
          * `entertainment` - Entertainment
          * `health` - Health
          * `other` - Other
      - in: query
        name: date
        schema:
          type: string
          format: date
      - in: query
        name: end_date
        schema:
          type: string
          format: date
      - in: query
        name: max_amount
        schema:
          type: number
      - in: query
        name: min_amount
        schema:
          type: number
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: start_date
        schema:
          type: string
          format: date
      - in: query
        name: type
        schema:
          type: string
          enum:
          - expense
          - income
        description: |-
          * `income` - Income
          * `expense` - Expense
      tags:
      - records
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFinancialRecordList'
          description: ''
    post:
      operationId: records_records_create
      description: |-
        API endpoint that allows financial records to be managed.
        Viewer: Read-only access to all records.
        Analyst: Read-only access to all records. (Wait, requirement says Analyst can view records and dashboard).
        Admin: Full CRUD.

        Actually, let's refine based on requirements:
        Viewer: Can only view data.
        Analyst: Can view records and dashboard.
        Admin: Full access (CRUD + user management).
      tags:
      - records
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinancialRecord'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FinancialRecord'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FinancialRecord'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialRecord'
          description: ''
  /api/records/records/{id}/:
    get:
      operationId: records_records_retrieve
      description: |-
        API endpoint that allows financial records to be managed.
        Viewer: Read-only access to all records.
        Analyst: Read-only access to all records. (Wait, requirement says Analyst can view records and dashboard).
        Admin: Full CRUD.

        Actually, let's refine based on requirements:
        Viewer: Can only view data.
        Analyst: Can view records and dashboard.
        Admin: Full access (CRUD + user management).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this financial record.
        required: true
      tags:
      - records
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialRecord'
          description: ''
    put:
      operationId: records_records_update
      description: |-
        API endpoint that allows financial records to be managed.
        Viewer: Read-only access to all records.
        Analyst: Read-only access to all records. (Wait, requirement says Analyst can view records and dashboard).
        Admin: Full CRUD.

        Actually, let's refine based on requirements:
        Viewer: Can only view data.
        Analyst: Can view records and dashboard.
        Admin: Full access (CRUD + user management).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this financial record.
        required: true
      tags:
      - records
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinancialRecord'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FinancialRecord'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FinancialRecord'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialRecord'
          description: ''
    patch:
      operationId: records_records_partial_update
      description: |-
        API endpoint that allows financial records to be managed.
        Viewer: Read-only access to all records.
        Analyst: Read-only access to all records. (Wait, requirement says Analyst can view records and dashboard).
        Admin: Full CRUD.

        Actually, let's refine based on requirements:
        Viewer: Can only view data.
        Analyst: Can view records and dashboard.
        Admin: Full access (CRUD + user management).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this financial record.
        required: true
      tags:
      - records
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedFinancialRecord'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedFinancialRecord'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedFinancialRecord'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialRecord'
          description: ''
    delete:
      operationId: records_records_destroy
      description: |-
        API endpoint that allows financial records to be managed.
        Viewer: Read-only access to all records.
        Analyst: Read-only access to all records. (Wait, requirement says Analyst can view records and dashboard).
        Admin: Full CRUD.

        Actually, let's refine based on requirements:
        Viewer: Can only view data.
        Analyst: Can view records and dashboard.
        Admin: Full access (CRUD + user management).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this financial record.
        required: true
      tags:
      - records
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/users/users/:
    get:
      operationId: users_users_list
      description: |-
        API endpoint that allows users to be viewed or edited.
        Only accessible by Admin role.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - users
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserList'
          description: ''
    post:
      operationId: users_users_create
      description: |-
        API endpoint that allows users to be viewed or edited.
        Only accessible by Admin role.
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreate'
          description: ''
  /api/users/users/{id}/:
    get:
      operationId: users_users_retrieve
      description: |-
        API endpoint that allows users to be viewed or edited.
        Only accessible by Admin role.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - users
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: users_users_update
      description: |-
        API endpoint that allows users to be viewed or edited.
        Only accessible by Admin role.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/User'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/User'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: users_users_partial_update
      description: |-
        API endpoint that allows users to be viewed or edited.
        Only accessible by Admin role.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
